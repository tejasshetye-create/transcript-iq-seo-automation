name: SEO Automation - Transcript IQ

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  seo-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-auth-oauthlib google-api-python-client requests

      - name: Run SEO automation
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_COLLECTION_ID: ${{ secrets.WEBFLOW_COLLECTION_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python seo_automation.py
