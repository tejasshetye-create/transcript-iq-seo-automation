name: SEO Automation - Transcript IQ

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  seo-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2
          pip install google-api-python-client
          pip install requests python-dotenv
          pip install anthropic

      - name: Run SEO Automation Script
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_COLLECTION_ID: ${{ secrets.WEBFLOW_COLLECTION_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: sc-domain:transcript-iq.com
        run: python seo_automation.py

      - name: Commit SEO report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add seo_report.json
          git diff --staged --quiet || git commit -m "SEO report: $(date +%Y-%m-%d)"
          git push
