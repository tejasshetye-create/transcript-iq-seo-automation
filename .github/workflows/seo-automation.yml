name: SEO Automation - Transcript IQ

on:
  schedule:
    # Runs every day at 3:30 AM UTC (9:00 AM IST)
    - cron: '30 3 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  seo-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-auth-oauthlib google-auth-httplib2
          pip install google-api-python-client
          pip install requests python-dotenv

      - name: Run SEO Automation Script
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_COLLECTION_ID: ${{ secrets.WEBFLOW_COLLECTION_ID }}
          SITE_URL: https://www.transcript-iq.com
        run: python seo_automation.py

      - name: Commit and push changes if any
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "SEO automation run: $(date +'%Y-%m-%d')"
          git push
